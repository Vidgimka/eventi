services:
  eventi_postgres:
    image: postgres:18.4-bookworm
    container_name:  eventi-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  eventi_migrate:
    image: migrate/migrate:v4.19.1
    volumes: 
      - ${PROJECT_ROOT}/migrations:/migrations

  port_forwarder:
    image: alpine/socat:1.8.0.3
    container_name: eventi-postgres-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:eventi_postgres:5432
    ports:
      - "127.0.0.1:5434:5432"